let produtosData = [];
let produtosPorPedido = {};

async function carregarProdutos() {
    try {
        // ===== USA A ROTA /api/sheet-data COM PARÂMETRO sheet=Produtos =====
        const response = await fetch(`${API_BASE_URL}/api/sheet-data?sheet=Produtos`, {
            method: 'GET',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            }
        });
        
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errorText}`);
        }
        
        const result = await response.json();
        
        if (!result.success) {
            throw new Error(result.error || 'Erro ao buscar produtos');
        }
        
        // ===== PROCESSAR DADOS =====
        processarDadosProdutos(result.data);
        
        return true;
    } catch (error) {
        console.error('❌ Erro ao carregar produtos:', error);
        showNotification('❌ Erro ao carregar produtos: ' + error.message, 'error');
        return false;
    }
}

function processarDadosProdutos(data) {
    if (!data || data.length < 2) {
        produtosData = [];
        produtosPorPedido = {};
        window.produtosData = [];
        return;
    }
    
    const idxPedido = 0;
    const idxData = 1;
    const idxNotaFiscal = 2;
    const idxPrecoCompra = 3;
    const idxProdutosUnicos = 8;
    const idxTotalProdutos = 9;
    const idxCodigo = 10;
    const idxProduto = 11;
    const idxQuantidade = 12;
    const idxPontos = 13;
    const idxValorUnit = 14;
    const idxValorTotal = 15;
    const idxVendaUnit = 16;
    const idxVendaTotal = 17;
    const idxLucro = 18;
    const idxLucroPercentual = 19;
    const idxLucroReal = 20;
    const idxLucroRealPercentual = 21;
    const idxReferencia = 22;
    
    let pedidoAtual = null;
    produtosPorPedido = {};
    
    for (let i = 1; i < data.length; i++) {
        const row = data[i];
        if (row.length < 10) continue;
        
        let pedido = String(row[idxPedido] || '').trim();
        if (pedido === '' || pedido === 'Pedido') {
            pedido = pedidoAtual;
        } else {
            pedidoAtual = pedido;
        }
        
        if (!pedido || pedido === 'Pedido') continue;
        
        if (!produtosPorPedido[pedido]) {
            produtosPorPedido[pedido] = {
                pedido: pedido,
                data: String(row[idxData] || '').trim(),
                notaFiscal: String(row[idxNotaFiscal] || '').trim(),
                precoCompra: limparValorProduto(String(row[idxPrecoCompra] || '0')),
                valorVendaTotal: 0,
                lucroTotal: 0,
                totalPontos: 0,
                produtosIndisponiveis: 0,
                linhas: []
            };
        }
        
        const codigo = row.length > idxCodigo ? String(row[idxCodigo] || '').trim() : '';
        const produto = row.length > idxProduto ? String(row[idxProduto] || '').trim() : '';
        const quantidade = row.length > idxQuantidade ? String(row[idxQuantidade] || '0').trim() : '0';
        const pontos = row.length > idxPontos ? parseInt(String(row[idxPontos] || '0').replace(/\./g, '').trim()) || 0 : 0;
        const valorUnit = row.length > idxValorUnit ? limparValorProduto(String(row[idxValorUnit] || '0')) : 0;
        const valorTotal = row.length > idxValorTotal ? limparValorProduto(String(row[idxValorTotal] || '0')) : 0;
        const vendaUnit = row.length > idxVendaUnit ? limparValorProduto(String(row[idxVendaUnit] || '0')) : 0;
        const vendaTotal = row.length > idxVendaTotal ? limparValorProduto(String(row[idxVendaTotal] || '0')) : 0;
        const lucro = row.length > idxLucro ? limparValorProduto(String(row[idxLucro] || '0')) : 0;
        const lucroPercentual = row.length > idxLucroPercentual ? limparValorProduto(String(row[idxLucroPercentual] || '0')) : 0;
        const referencia = row.length > idxReferencia ? String(row[idxReferencia] || '').trim() : '';
        
        const isIndisponivel = referencia.includes('Produtos indisponível na realização do pedido');
        
        produtosPorPedido[pedido].linhas.push({
            linha: i,
            codigo: codigo,
            produto: produto,
            quantidade: quantidade,
            pontos: pontos,
            valorUnit: valorUnit,
            valorTotal: valorTotal,
            vendaUnit: vendaUnit,
            vendaTotal: vendaTotal,
            lucro: lucro,
            lucroPercentual: lucroPercentual,
            referencia: referencia,
            isIndisponivel: isIndisponivel,
            valorCompra: valorUnit,
            valorVenda: vendaUnit
        });
        
        if (!isIndisponivel && vendaTotal > 0) {
            produtosPorPedido[pedido].valorVendaTotal += vendaTotal;
            produtosPorPedido[pedido].lucroTotal += lucro;
            const qtd = parseInt(quantidade) || 0;
            produtosPorPedido[pedido].totalPontos += pontos;
        }
        if (isIndisponivel) {
            produtosPorPedido[pedido].produtosIndisponiveis++;
        }
    }
    
    produtosData = Object.values(produtosPorPedido).map(p => {
        let produtosUnicos = 0;
        let totalProdutos = 0;
        let totalPontos = 0;
        let produtosIndisponiveis = 0;
        let precoVenda = 0;

        for (const item of p.linhas) {
            if (item.isIndisponivel) {
                produtosIndisponiveis++;
                continue;
            }

            if (item.vendaTotal === 0) break;

            const qtd = parseInt(item.quantidade) || 0;
            if (qtd > 0) {
                produtosUnicos++;
                totalProdutos += qtd;
                totalPontos += item.pontos;
                precoVenda += (item.vendaUnit || 0) * qtd;
            }
        }

        // ===== CALCULAR LUCRO = VENDA - COMPRA =====
        const lucroTotal = precoVenda - p.precoCompra;
        const lucroPercentual = p.precoCompra > 0 ? (lucroTotal / p.precoCompra) * 100 : 0;

        return {
            ...p,
            produtosUnicos: produtosUnicos,
            totalProdutos: totalProdutos,
            totalPontos: totalPontos,
            produtosIndisponiveis: produtosIndisponiveis,
            precoVenda: precoVenda,
            lucroTotal: lucroTotal,
            lucroPercentual: lucroPercentual
        };
    });
    
    window.produtosData = produtosData;
    window.produtosPorPedido = produtosPorPedido;
    
    console.log(`📊 ${produtosData.length} pedidos carregados da aba Produtos`);
    console.log('📋 Exemplo - primeiro pedido:', produtosData[0]?.pedido);
    console.log('📋 precoVenda:', produtosData[0]?.precoVenda);
    console.log('📋 lucroTotal:', produtosData[0]?.lucroTotal);
}

async function carregarProdutosDetalhados(pedidoId) {
    const tbody = document.getElementById(`produtos-detalhe-${pedidoId}`);
    if (!tbody) return;
    
    if (tbody.querySelector('tr')?.textContent !== 'Carregando produtos...') {
        return;
    }
    
    try {
        const response = await fetch(`${API_BASE_URL}/api/sheet-data?sheet=Produtos`, {
            method: 'GET',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' }
        });
        
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const result = await response.json();
        if (!result.success || !result.data) throw new Error('Erro ao buscar produtos');
        
        const data = result.data;
        
        const idxPedido = 0;
        const idxCodigo = 10;
        const idxProduto = 11;
        const idxQuantidade = 12;
        const idxPontos = 13;
        const idxValorUnit = 14;
        const idxValorTotal = 15;
        const idxVendaUnit = 16;
        const idxVendaTotal = 17;
        const idxLucro = 18;
        const idxLucroPercentual = 19;
        const idxLucroReal = 20;
        const idxLucroRealPercentual = 21;
        const idxReferencia = 22;
        
        let linhasPedido = [];
        let pedidoAtual = null;
        
        for (let i = 1; i < data.length; i++) {
            const row = data[i];
            if (row.length < 10) continue;
            
            let pedido = String(row[idxPedido] || '').trim();
            if (pedido === '' || pedido === 'Pedido') {
                pedido = pedidoAtual;
            } else {
                pedidoAtual = pedido;
            }
            
            if (pedido === pedidoId) {
                const codigo = String(row[idxCodigo] || '').trim();
                if (codigo !== '' && codigo !== 'CÓDIGO') {
                    linhasPedido.push(row);
                }
            }
        }
        
        if (linhasPedido.length === 0) {
            tbody.innerHTML = `<tr><td colspan="13" style="text-align:center; padding:20px; color:#999;">Nenhum produto encontrado para este pedido.</td></tr>`;
            return;
        }
        
        let disponiveis = [];
        let indisponiveis = [];
        
        for (const row of linhasPedido) {
            const referencia = String(row[idxReferencia] || '').trim();
            const isIndisponivel = referencia.includes('Produtos indisponível na realização do pedido');
            
            if (isIndisponivel) {
                indisponiveis.push(row);
            } else {
                disponiveis.push(row);
            }
        }
        
        // ===== CONTAR OCORRÊNCIAS DE CADA PRODUTO =====
        const contagemProdutos = {};
        for (const row of disponiveis) {
            const codigo = String(row[idxCodigo] || '').trim();
            const vendaUnit = limparValorProduto(String(row[idxVendaUnit] || '0'));
            const chave = vendaUnit > 0 ? `${codigo}_${vendaUnit}` : codigo;
            contagemProdutos[chave] = (contagemProdutos[chave] || 0) + 1;
        }
        
        // ===== AGRUPAR PRODUTOS DISPONÍVEIS =====
        const produtosAgrupados = {};
        const produtosOriginal = [];
        
        for (const row of disponiveis) {
            const codigo = String(row[idxCodigo] || '').trim();
            const vendaUnit = limparValorProduto(String(row[idxVendaUnit] || '0'));
            const chave = vendaUnit > 0 ? `${codigo}_${vendaUnit}` : codigo;
            const temRepeticao = contagemProdutos[chave] > 1;
            
            if (!produtosAgrupados[chave]) {
                produtosAgrupados[chave] = {
                    codigo: codigo,
                    produto: String(row[idxProduto] || '').trim(),
                    vendaUnit: vendaUnit,
                    quantidadeTotal: 0,
                    valorCompraTotal: 0,
                    pontosTotal: 0,
                    lucroTotal: 0,
                    lucroPercentualTotal: 0,
                    referencia: String(row[idxReferencia] || '').trim(),
                    lucroReal: 0,
                    lucroRealPercentual: 0,
                    maiorValorUnit: 0,
                    referenciaMaiorValor: '',
                    lucroPercentualDescMaior: 0,
                    lucroRealDescMaior: 0,
                    itens: [],
                    temRepeticao: temRepeticao
                };
            }
            
            const qtd = parseInt(String(row[idxQuantidade] || '0').trim()) || 0;
            const valorUnit = limparValorProduto(String(row[idxValorUnit] || '0'));
            const pontos = parseInt(String(row[idxPontos] || '0').replace(/\./g, '').trim()) || 0;
            const lucro = limparValorProduto(String(row[idxLucro] || '0'));
            const lucroPercentual = limparValorProduto(String(row[idxLucroPercentual] || '0'));
            const lucroReal = limparValorProduto(String(row[idxLucroReal] || '0'));
            const lucroRealPercentual = limparValorProduto(String(row[idxLucroRealPercentual] || '0'));
            const referencia = String(row[idxReferencia] || '').trim();
            
            produtosAgrupados[chave].quantidadeTotal += qtd;

function limparValorProduto(valor) {
    if (!valor || valor === '') return 0;
    const str = String(valor).replace('R$', '').replace(/\./g, '').replace(',', '.').trim();
    return parseFloat(str) || 0;
}

function mostrarProdutosPorPedido() {
    console.log('🔍 mostrarProdutosPorPedido chamada!');
    
    const botoesProdutos = document.querySelectorAll('#submenuProdutos .btn-submenu');
    botoesProdutos.forEach(b => b.classList.remove('active'));
    if (botoesProdutos.length > 0) {
        botoesProdutos[0].classList.add('active');
    }
    
    const submenu = document.getElementById('submenuProdutos');
    if (submenu) {
        submenu.style.display = 'flex';
        submenu.style.background = '#f8f9fa';
    }
    
    const dataTable = document.getElementById('dataTable');
    const mesContainer = document.getElementById('mesContainer');
    const semanaInfo = document.getElementById('semanaInfo');
    const statsContainer = document.getElementById('statsContainer');
    const tableWrapper = document.getElementById('tableWrapper');
    
    if (dataTable) dataTable.style.display = 'none';
    if (mesContainer) mesContainer.style.display = 'none';
    if (statsContainer) statsContainer.classList.add('stats-hidden');
    
    // ===== ADICIONAR O SUBMENU DE PERÍODO =====
    if (semanaInfo) {
        semanaInfo.style.display = 'block';
        semanaInfo.innerHTML = `
            <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center; padding:4px 0;">
                <button class="btn-submenu active" onclick="filtrarProdutosPorPedido('todo')">Todo o período</button>
                <button class="btn-submenu" onclick="filtrarProdutosPorPedido('mes')">Esse mês</button>
                <button class="btn-submenu" onclick="filtrarProdutosPorPedido('3meses')">Últimos 3 meses</button>
                <button class="btn-submenu" onclick="filtrarProdutosPorPedido('5meses')">Últimos 5 meses</button>
                <button class="btn-submenu" onclick="filtrarProdutosPorPedido('8meses')">Últimos 8 meses</button>
                <button class="btn-submenu" onclick="filtrarProdutosPorPedido('12meses')">Últimos 12 meses</button>
            </div>
        `;
    }
    
    if (tableWrapper) {
        tableWrapper.innerHTML = `
            <div style="text-align:center; padding:40px; color:#667;">
                <div class="loading" style="display:block;">⏳ Carregando dados de produtos...</div>
            </div>
        `;
    }
    
    // ===== APLICAR FILTRO DE PERÍODO =====
    const periodo = window.periodoAtualProdutosPorPedido || 'todo';
    let dataLimite = null;
    const agora = new Date();
    
    if (periodo === 'mes') {
        dataLimite = new Date(agora.getFullYear(), agora.getMonth(), 1);
    } else if (periodo === '3meses') {
        dataLimite = new Date(agora);
        dataLimite.setMonth(agora.getMonth() - 3);
    } else if (periodo === '5meses') {
        dataLimite = new Date(agora);
        dataLimite.setMonth(agora.getMonth() - 5);
    } else if (periodo === '8meses') {
        dataLimite = new Date(agora);
        dataLimite.setMonth(agora.getMonth() - 8);
    } else if (periodo === '12meses') {
        dataLimite = new Date(agora);
        dataLimite.setMonth(agora.getMonth() - 12);
    }
    
    // Filtrar produtosData pelo período
    let produtosFiltrados = produtosData;
    if (dataLimite) {
        produtosFiltrados = produtosData.filter(p => {
            const dataPedido = new Date(p.data.split('/').reverse().join('/'));
            return dataPedido >= dataLimite;
        });
    }
    
    // Guardar os dados filtrados para usar no render
    window.produtosDataFiltrados = produtosFiltrados;
    
    // ===== RENDERIZAR COM OS DADOS FILTRADOS =====
    if (produtosFiltrados && produtosFiltrados.length > 0) {
        renderizarTabelaProdutosComFiltro(produtosFiltrados);
    } else if (tableWrapper) {
        tableWrapper.innerHTML = `
            <div style="text-align:center; padding:40px; color:#667;">
                📦 Nenhum dado de produto encontrado no período selecionado.
                <br><br>
                <button onclick="filtrarProdutosPorPedido('todo')" class="btn" style="background:#28a745;">Ver todos</button>
            </div>
        `;
    }
}

function calcularProdutosMaisPedidos(periodo) {
    console.log('📊 Calculando produtos mais pedidos - Período:', periodo);
    
    let dataLimite = null;
    const agora = new Date();
    
    if (periodo === 'mes') {
        dataLimite = new Date(agora.getFullYear(), agora.getMonth(), 1);
    } else if (periodo === '3meses') {
        dataLimite = new Date(agora);
        dataLimite.setMonth(agora.getMonth() - 3);
    } else if (periodo === '5meses') {
        dataLimite = new Date(agora);
        dataLimite.setMonth(agora.getMonth() - 5);
    } else if (periodo === '8meses') {
        dataLimite = new Date(agora);
        dataLimite.setMonth(agora.getMonth() - 8);
    } else if (periodo === '12meses') {
        dataLimite = new Date(agora);
        dataLimite.setMonth(agora.getMonth() - 12);
    }
    
    const produtos = {};
    let totalPedidos = 0;
    
    for (const pedido of produtosData) {
        if (dataLimite) {
            const dataPedido = new Date(pedido.data.split('/').reverse().join('/'));
            if (dataPedido < dataLimite) continue;
        }
        
        totalPedidos++;
        
        if (!pedido.linhas || pedido.linhas.length === 0) continue;
        
        // ===== AGRUPAR PRODUTOS DO MESMO PEDIDO =====
        const produtosDoPedido = {};
        
        for (const linha of pedido.linhas) {
            if (linha.isIndisponivel) continue;
            
            const codigo = linha.codigo;
            if (!codigo) continue;
            
            const vendaUnit = linha.vendaUnit || 0;
            const chave = vendaUnit > 0 ? `${codigo}_${vendaUnit}` : codigo;
            
            if (!produtosDoPedido[chave]) {
                produtosDoPedido[chave] = {
                    codigo: codigo,
                    produto: linha.produto,
                    vendaUnit: vendaUnit,
                    quantidadeTotal: 0,
                    valorCompraTotal: 0,
                    items: []
                };
            }
            
            const qtd = parseInt(linha.quantidade) || 0;
            const valorUnit = linha.valorUnit || 0;
            
            produtosDoPedido[chave].quantidadeTotal += qtd;
            produtosDoPedido[chave].valorCompraTotal += valorUnit * qtd;
            produtosDoPedido[chave].items.push({
                quantidade: qtd,
                valorUnit: valorUnit
            });
        }
        
        // ===== ADICIONAR AO ACUMULADOR GERAL =====
        for (const chave in produtosDoPedido) {
            const item = produtosDoPedido[chave];
            const codigo = item.codigo;
            
            // Calcular valor médio de compra
            const valorCompraMedio = item.quantidadeTotal > 0 ? item.valorCompraTotal / item.quantidadeTotal : 0;
            
            // ===== CALCULAR LUCRO UNITÁRIO =====
            const lucroUni = item.vendaUnit - valorCompraMedio;
            const lucroPercentual = valorCompraMedio > 0 ? (lucroUni / valorCompraMedio) * 100 : 0;
            
            if (!produtos[codigo]) {
                produtos[codigo] = {
                    codigo: codigo,
                    produto: item.produto,
                    vezes: 0,
                    quantidadeTotal: 0,
                    valoresCompra: [],
                    valoresVenda: [],
                    lucros: [],        // ← AGORA ARMAZENA LUCRO UNITÁRIO
                    lucrosPercentuais: [],
                    pedidos: []
                };
            }
            
            produtos[codigo].vezes++;
            produtos[codigo].quantidadeTotal += item.quantidadeTotal;
            
            if (valorCompraMedio > 0) produtos[codigo].valoresCompra.push(valorCompraMedio);
            if (item.vendaUnit > 0) produtos[codigo].valoresVenda.push(item.vendaUnit);
            
            // ===== ARMAZENAR LUCRO UNITÁRIO =====
            if (lucroUni > 0) produtos[codigo].lucros.push(lucroUni);
            if (lucroPercentual > 0) produtos[codigo].lucrosPercentuais.push(lucroPercentual);
            
            produtos[codigo].pedidos.push({
                pedido: pedido.pedido,
                data: pedido.data,
                quantidade: item.quantidadeTotal,
                valorCompra: valorCompraMedio,
                valorVenda: item.vendaUnit,
                lucroUni: lucroUni,
                lucroPercentual: lucroPercentual
            });
        }
    }
    
    const resultados = Object.values(produtos);
    resultados.sort((a, b) => b.quantidadeTotal - a.quantidadeTotal);
    
    console.log(`📊 ${resultados.length} produtos encontrados em ${totalPedidos} pedidos`);
    return resultados;
}

    if (row.classList.contains('show')) {
        const container = document.getElementById(`detalhe-pedidos-produto-${codigo}`);

            return;

            const pedidoKey = pedido.pedido;

                pedidosAgrupados[pedidoKey] = {
                    pedido: pedido.pedido,
                    data: pedido.data,
                    quantidadeTotal: 0,
                    valorCompraTotal: 0,
                    valorVenda: 0
                };

            for (const linha of pedido.linhas) {
                if (linha.codigo === codigo && !linha.isIndisponivel) {
                    const qtd = parseInt(linha.quantidade) || 0;
                    const valorUnit = linha.valorUnit || 0;
                    const vendaUnit = linha.vendaUnit || 0;
                    
                    pedidosAgrupados[pedidoKey].quantidadeTotal += qtd;
                    pedidosAgrupados[pedidoKey].valorCompraTotal += valorUnit * qtd;
                    pedidosAgrupados[pedidoKey].valorVenda = vendaUnit;

// ===== FUNÇÃO PARA CALCULAR PRODUTOS COM MAIOR LUCRO =====
function calcularProdutosMaiorLucro(periodo) {
    console.log('📊 Calculando produtos com maior lucro - Período:', periodo);
    
    let dataLimite = null;
    const agora = new Date();
    
    if (periodo === 'mes') {
        dataLimite = new Date(agora.getFullYear(), agora.getMonth(), 1);
    } else if (periodo === '3meses') {
        dataLimite = new Date(agora);
        dataLimite.setMonth(agora.getMonth() - 3);
    } else if (periodo === '5meses') {
        dataLimite = new Date(agora);
        dataLimite.setMonth(agora.getMonth() - 5);
    } else if (periodo === '8meses') {
        dataLimite = new Date(agora);
        dataLimite.setMonth(agora.getMonth() - 8);
    } else if (periodo === '12meses') {
        dataLimite = new Date(agora);
        dataLimite.setMonth(agora.getMonth() - 12);
    }
    
    const produtos = {};
    let totalPedidos = 0;
    const periodoData = periodo; // Guardar período para usar nos detalhes
    
    for (const pedido of produtosData) {
        if (dataLimite) {
            const dataPedido = new Date(pedido.data.split('/').reverse().join('/'));
            if (dataPedido < dataLimite) continue;
        }
        
        totalPedidos++;
        
        if (!pedido.linhas || pedido.linhas.length === 0) continue;
        
        const produtosDoPedido = {};
        
        for (const linha of pedido.linhas) {
            if (linha.isIndisponivel) continue;
            
            const codigo = linha.codigo;
            if (!codigo) continue;
            
            const vendaUnit = linha.vendaUnit || 0;
            const chave = vendaUnit > 0 ? `${codigo}_${vendaUnit}` : codigo;
            
            if (!produtosDoPedido[chave]) {
                produtosDoPedido[chave] = {
                    codigo: codigo,
                    produto: linha.produto,
                    vendaUnit: vendaUnit,
                    quantidadeTotal: 0,
                    valorCompraTotal: 0,
                    items: []
                };
            }
            
            const qtd = parseInt(linha.quantidade) || 0;
            const valorUnit = linha.valorUnit || 0;
            
            produtosDoPedido[chave].quantidadeTotal += qtd;
            produtosDoPedido[chave].valorCompraTotal += valorUnit * qtd;
            produtosDoPedido[chave].items.push({
                quantidade: qtd,
                valorUnit: valorUnit
            });
        }
        
        for (const chave in produtosDoPedido) {
            const item = produtosDoPedido[chave];
            const codigo = item.codigo;
            
            const valorCompraMedio = item.quantidadeTotal > 0 ? item.valorCompraTotal / item.quantidadeTotal : 0;
            const lucroUni = item.vendaUnit - valorCompraMedio;
            const lucroPercentual = valorCompraMedio > 0 ? (lucroUni / valorCompraMedio) * 100 : 0;
            
            if (!produtos[codigo]) {
                produtos[codigo] = {
                    codigo: codigo,
                    produto: item.produto,
                    vezes: 0,
                    quantidadeTotal: 0,
                    valoresCompra: [],
                    valoresVenda: [],
                    lucros: [],
                    lucrosPercentuais: [],
                    pedidos: [],
                    periodoData: periodoData // Guardar período
                };
            }
            
            produtos[codigo].vezes++;
            produtos[codigo].quantidadeTotal += item.quantidadeTotal;
            
            if (valorCompraMedio > 0) produtos[codigo].valoresCompra.push(valorCompraMedio);
            if (item.vendaUnit > 0) produtos[codigo].valoresVenda.push(item.vendaUnit);
            if (lucroUni > 0) produtos[codigo].lucros.push(lucroUni);
            if (lucroPercentual > 0) produtos[codigo].lucrosPercentuais.push(lucroPercentual);
            
            produtos[codigo].pedidos.push({
                pedido: pedido.pedido,
                data: pedido.data,
                quantidade: item.quantidadeTotal,
                valorCompra: valorCompraMedio,
                valorVenda: item.vendaUnit,
                lucroUni: lucroUni,
                lucroPercentual: lucroPercentual
            });
        }
    }
    
    const resultados = Object.values(produtos);
    
    // ===== ORDENAR POR LUCRO (VALOR OU PERCENTUAL) =====
    const organizacao = window.organizacaoAtualMaiorLucro || 'valor';
    resultados.sort((a, b) => {
        let valorA, valorB;
        if (organizacao === 'valor') {
            valorA = a.lucros.length > 0 ? Math.max(...a.lucros) : 0;
            valorB = b.lucros.length > 0 ? Math.max(...b.lucros) : 0;
        } else {
            valorA = a.lucrosPercentuais.length > 0 ? Math.max(...a.lucrosPercentuais) : 0;
            valorB = b.lucrosPercentuais.length > 0 ? Math.max(...b.lucrosPercentuais) : 0;
        }
        return valorB - valorA;
    });
    
    console.log(`📊 ${resultados.length} produtos encontrados em ${totalPedidos} pedidos`);
    return resultados;
}

        if (!pedido.linhas || pedido.linhas.length === 0) continue;
        
        const produtosDoPedido = {};
        
        for (const linha of pedido.linhas) {
            if (linha.isIndisponivel) continue;
            
            const codigo = linha.codigo;
            if (!codigo) continue;
            
            const vendaUnit = linha.vendaUnit || 0;
            const chave = vendaUnit > 0 ? `${codigo}_${vendaUnit}` : codigo;
            
            if (!produtosDoPedido[chave]) {
                produtosDoPedido[chave] = {
                    codigo: codigo,
                    produto: linha.produto,
                    vendaUnit: vendaUnit,
                    quantidadeTotal: 0,
                    valorCompraTotal: 0,
                    items: []
                };
            }
            
            const qtd = parseInt(linha.quantidade) || 0;
            const valorUnit = linha.valorUnit || 0;
            
            produtosDoPedido[chave].quantidadeTotal += qtd;
            produtosDoPedido[chave].valorCompraTotal += valorUnit * qtd;
            produtosDoPedido[chave].items.push({
                quantidade: qtd,
                valorUnit: valorUnit
            });
        }
        
        for (const chave in produtosDoPedido) {
            const item = produtosDoPedido[chave];
            const codigo = item.codigo;
            
            const valorCompraMedio = item.quantidadeTotal > 0 ? item.valorCompraTotal / item.quantidadeTotal : 0;
            const lucroUni = item.vendaUnit - valorCompraMedio;
            const lucroPercentual = valorCompraMedio > 0 ? (lucroUni / valorCompraMedio) * 100 : 0;
            
            if (!produtos[codigo]) {
                produtos[codigo] = {
                    codigo: codigo,
                    produto: item.produto,
                    vezes: 0,
                    quantidadeTotal: 0,
                    valoresCompra: [],
                    valoresVenda: [],
                    lucros: [],
                    lucrosPercentuais: [],
                    pedidos: []
                };
            }
            
            produtos[codigo].vezes++;
            produtos[codigo].quantidadeTotal += item.quantidadeTotal;
            
            if (valorCompraMedio > 0) produtos[codigo].valoresCompra.push(valorCompraMedio);
            if (item.vendaUnit > 0) produtos[codigo].valoresVenda.push(item.vendaUnit);
            if (lucroUni > 0) produtos[codigo].lucros.push(lucroUni);
            if (lucroPercentual > 0) produtos[codigo].lucrosPercentuais.push(lucroPercentual);
            
            produtos[codigo].pedidos.push({
                pedido: pedido.pedido,
                data: pedido.data,
                quantidade: item.quantidadeTotal,
                valorCompra: valorCompraMedio,
                valorVenda: item.vendaUnit,
                lucroUni: lucroUni,
                lucroPercentual: lucroPercentual
            });
        }
    }
    
    const resultados = Object.values(produtos);
    
    // ===== ORDENAR POR MENOS PEDIDOS (CRESCENTE) =====
    const organizacao = window.organizacaoAtualMenosPedidos || 'vezes';
    resultados.sort((a, b) => {
        let valorA, valorB;
        if (organizacao === 'vezes') {
            valorA = a.vezes;
            valorB = b.vezes;
        } else {
            valorA = a.quantidadeTotal;
            valorB = b.quantidadeTotal;
        }
        return valorA - valorB; // ← CRESCENTE (menos primeiro)
    });
    
    console.log(`📊 ${resultados.length} produtos encontrados em ${totalPedidos} pedidos`);
    return resultados;
}

// ===== FUNÇÃO PARA ORGANIZAR MENOS PEDIDOS =====
function organizarMenosPedidos(tipo) {
    const btnVezes = document.getElementById('btn-organizar-menos-vezes');
    const btnQuantidade = document.getElementById('btn-organizar-menos-quantidade');
    
    if (btnVezes) btnVezes.classList.remove('active');
    if (btnQuantidade) btnQuantidade.classList.remove('active');
    
    if (tipo === 'vezes') {
        if (btnVezes) btnVezes.classList.add('active');
        window.organizacaoAtualMenosPedidos = 'vezes';
    } else {
        if (btnQuantidade) btnQuantidade.classList.add('active');
        window.organizacaoAtualMenosPedidos = 'quantidade';
    }
    
    const produtos = calcularProdutosMenosPedidos(window.periodoAtualMenosPedidos || 'todo');
    const periodos = {
        'todo': 'Todo o período',
        'mes': 'Esse mês',
        '3meses': 'Últimos 3 meses',
        '5meses': 'Últimos 5 meses',
        '8meses': 'Últimos 8 meses',
        '12meses': 'Últimos 12 meses'
    };
    const titulo = `📉 Produtos menos pedidos - ${periodos[window.periodoAtualMenosPedidos || 'todo']}`;
    renderizarMenosPedidos(produtos, titulo, tipo);
}





// ===== FUNÇÃO PARA FILTRAR MENOS PEDIDOS POR PERÍODO =====
function filtrarMenosPedidos(periodo) {
    const botoes = document.querySelectorAll('#semanaInfo .btn-submenu');
    botoes.forEach(b => b.classList.remove('active'));
    
    const periodos = {
        'todo': 'Todo o período',
        'mes': 'Esse mês',
        '3meses': 'Últimos 3 meses',
        '5meses': 'Últimos 5 meses',
        '8meses': 'Últimos 8 meses',
        '12meses': 'Últimos 12 meses'
    };
    
    botoes.forEach(b => {
        if (b.textContent.trim() === periodos[periodo]) {

        }
    });
    
    window.periodoAtualMenosPedidos = periodo;

    renderizarMenosPedidos(produtos, titulo, window.organizacaoAtualMenosPedidos || 'vezes');
}



// ===== FUNÇÃO PARA CALCULAR MAIOR DIFERENÇA DE PREÇO =====
function calcularProdutosMaiorDiferenca(periodo) {
    console.log('📊 Calculando maior diferença de preço - Período:', periodo);
    
    let dataLimite = null;
    const agora = new Date();
    
    if (periodo === 'mes') {
        dataLimite = new Date(agora.getFullYear(), agora.getMonth(), 1);
    } else if (periodo === '3meses') {
        dataLimite = new Date(agora);
        dataLimite.setMonth(agora.getMonth() - 3);
    } else if (periodo === '5meses') {
        dataLimite = new Date(agora);
        dataLimite.setMonth(agora.getMonth() - 5);
    } else if (periodo === '8meses') {
        dataLimite = new Date(agora);
        dataLimite.setMonth(agora.getMonth() - 8);
    } else if (periodo === '12meses') {
        dataLimite = new Date(agora);
        dataLimite.setMonth(agora.getMonth() - 12);
    }
    
    const produtos = {};
    let totalPedidos = 0;
    
    for (const pedido of produtosData) {
        if (dataLimite) {
            const dataPedido = new Date(pedido.data.split('/').reverse().join('/'));
            if (dataPedido < dataLimite) continue;
        }
        
        totalPedidos++;
        
        if (!pedido.linhas || pedido.linhas.length === 0) continue;
        
        const produtosDoPedido = {};
        
        for (const linha of pedido.linhas) {
            if (linha.isIndisponivel) continue;
            
            const codigo = linha.codigo;
            if (!codigo) continue;
            
            const vendaUnit = linha.vendaUnit || 0;
            const chave = vendaUnit > 0 ? `${codigo}_${vendaUnit}` : codigo;
            
            if (!produtosDoPedido[chave]) {
                produtosDoPedido[chave] = {
                    codigo: codigo,
                    produto: linha.produto,
                    vendaUnit: vendaUnit,
                    quantidadeTotal: 0,
                    valorCompraTotal: 0,
                    items: []
                };
            }
            
            const qtd = parseInt(linha.quantidade) || 0;
            const valorUnit = linha.valorUnit || 0;
            
            produtosDoPedido[chave].quantidadeTotal += qtd;
            produtosDoPedido[chave].valorCompraTotal += valorUnit * qtd;
            produtosDoPedido[chave].items.push({
                quantidade: qtd,
                valorUnit: valorUnit
            });
        }
        
        for (const chave in produtosDoPedido) {
            const item = produtosDoPedido[chave];
            const codigo = item.codigo;
            
            const valorCompraMedio = item.quantidadeTotal > 0 ? item.valorCompraTotal / item.quantidadeTotal : 0;
            const lucroUni = item.vendaUnit - valorCompraMedio;
            const lucroPercentual = valorCompraMedio > 0 ? (lucroUni / valorCompraMedio) * 100 : 0;
            
            if (!produtos[codigo]) {
                produtos[codigo] = {
                    codigo: codigo,
                    produto: item.produto,
                    vezes: 0,
                    quantidadeTotal: 0,
                    valoresCompra: [],
                    valoresVenda: [],
                    lucros: [],
                    lucrosPercentuais: [],
                    pedidos: []
                };
            }
            
            produtos[codigo].vezes++;
            produtos[codigo].quantidadeTotal += item.quantidadeTotal;
            
            if (valorCompraMedio > 0) produtos[codigo].valoresCompra.push(valorCompraMedio);
            if (item.vendaUnit > 0) produtos[codigo].valoresVenda.push(item.vendaUnit);
            if (lucroUni > 0) produtos[codigo].lucros.push(lucroUni);
            if (lucroPercentual > 0) produtos[codigo].lucrosPercentuais.push(lucroPercentual);
            
            produtos[codigo].pedidos.push({
                pedido: pedido.pedido,
                data: pedido.data,
                quantidade: item.quantidadeTotal,
                valorCompra: valorCompraMedio,
                valorVenda: item.vendaUnit,
                lucroUni: lucroUni,
                lucroPercentual: lucroPercentual
            });
        }
    }
    
    const resultados = Object.values(produtos);
    
    // ===== ORDENAR POR MAIOR DIFERENÇA =====
    const organizacao = window.organizacaoAtualDiferenca || 'compra';
    resultados.sort((a, b) => {
        let valorA, valorB;
        
        if (organizacao === 'compra') {
            const minA = a.valoresCompra.length > 0 ? Math.min(...a.valoresCompra) : 0;
            const maxA = a.valoresCompra.length > 0 ? Math.max(...a.valoresCompra) : 0;
            const minB = b.valoresCompra.length > 0 ? Math.min(...b.valoresCompra) : 0;
            const maxB = b.valoresCompra.length > 0 ? Math.max(...b.valoresCompra) : 0;
            valorA = maxA - minA;
            valorB = maxB - minB;
        } else if (organizacao === 'venda') {
            const minA = a.valoresVenda.length > 0 ? Math.min(...a.valoresVenda) : 0;
            const maxA = a.valoresVenda.length > 0 ? Math.max(...a.valoresVenda) : 0;
            const minB = b.valoresVenda.length > 0 ? Math.min(...b.valoresVenda) : 0;
            const maxB = b.valoresVenda.length > 0 ? Math.max(...b.valoresVenda) : 0;
            valorA = maxA - minA;
            valorB = maxB - minB;
        } else if (organizacao === 'lucro') {
            const minA = a.lucros.length > 0 ? Math.min(...a.lucros) : 0;
            const maxA = a.lucros.length > 0 ? Math.max(...a.lucros) : 0;
            const minB = b.lucros.length > 0 ? Math.min(...b.lucros) : 0;
            const maxB = b.lucros.length > 0 ? Math.max(...b.lucros) : 0;
            valorA = maxA - minA;
            valorB = maxB - minB;
        } else {
            const minA = a.lucrosPercentuais.length > 0 ? Math.min(...a.lucrosPercentuais) : 0;
            const maxA = a.lucrosPercentuais.length > 0 ? Math.max(...a.lucrosPercentuais) : 0;
            const minB = b.lucrosPercentuais.length > 0 ? Math.min(...b.lucrosPercentuais) : 0;
            const maxB = b.lucrosPercentuais.length > 0 ? Math.max(...b.lucrosPercentuais) : 0;
            valorA = maxA - minA;
            valorB = maxB - minB;
        }
        
        return valorB - valorA;
    });
    
    console.log(`📊 ${resultados.length} produtos encontrados em ${totalPedidos} pedidos`);
    return resultados;
}

// ===== FUNÇÃO TOGGLE DETALHES MAIOR DIFERENÇA =====
function toggleDetalhesProdutosMaiorDiferenca(codigo) {
    console.log('🔍 toggleDetalhesProdutosMaiorDiferenca chamado para:', codigo);
    
    const row = document.getElementById(`detalhe-produto-diferenca-${codigo}`);
    if (!row) return;
    
    row.classList.toggle('show');
    const icon = row.previousElementSibling.querySelector('.expand-icon');
    if (icon) icon.innerHTML = row.classList.contains('show') ? '▼' : '▶';
    
    if (row.classList.contains('show')) {
        const container = document.getElementById(`detalhe-pedidos-diferenca-${codigo}`);
        if (!container) return;
        
        if (container.innerHTML.includes('Clique para carregar') === false && container.innerHTML.trim() !== '') {
            return;
        }
        
        const periodo = window.periodoAtualDiferenca || 'todo';
        
        let dataLimite = null;
        const agora = new Date();
        
        if (periodo === 'mes') {
            dataLimite = new Date(agora.getFullYear(), agora.getMonth(), 1);
        } else if (periodo === '3meses') {
            dataLimite = new Date(agora);
            dataLimite.setMonth(agora.getMonth() - 3);
        } else if (periodo === '5meses') {
            dataLimite = new Date(agora);
            dataLimite.setMonth(agora.getMonth() - 5);
        } else if (periodo === '8meses') {
            dataLimite = new Date(agora);
            dataLimite.setMonth(agora.getMonth() - 8);
        } else if (periodo === '12meses') {
            dataLimite = new Date(agora);
            dataLimite.setMonth(agora.getMonth() - 12);
        }
        
        const pedidosAgrupados = {};
        
        for (const pedido of produtosData) {
            if (dataLimite) {
                const dataPedido = new Date(pedido.data.split('/').reverse().join('/'));
                if (dataPedido < dataLimite) continue;
            }
            
            if (!pedido.linhas) continue;
            
            const pedidoKey = pedido.pedido;
            if (!pedidosAgrupados[pedidoKey]) {
                pedidosAgrupados[pedidoKey] = {
                    pedido: pedido.pedido,
                    data: pedido.data,
                    quantidadeTotal: 0,
                    valorCompraTotal: 0,
                    valorVenda: 0
                };
            }
            
            for (const linha of pedido.linhas) {
                if (linha.codigo === codigo && !linha.isIndisponivel) {
                    const qtd = parseInt(linha.quantidade) || 0;
                    const valorUnit = linha.valorUnit || 0;
                    const vendaUnit = linha.vendaUnit || 0;
                    
                    pedidosAgrupados[pedidoKey].quantidadeTotal += qtd;
                    pedidosAgrupados[pedidoKey].valorCompraTotal += valorUnit * qtd;
                    pedidosAgrupados[pedidoKey].valorVenda = vendaUnit;
                }
            }
        }
        
        let html = `
            <table style="width:100%; border-collapse:collapse; font-size:12px;">
                <thead>
                    <tr style="background:#f1f3f5;">
                        <th style="padding:6px 8px; text-align:left;">Pedido</th>
                        <th style="padding:6px 8px; text-align:left;">Data</th>
                        <th style="padding:6px 8px; text-align:center;">Qtd</th>
                        <th style="padding:6px 8px; text-align:right;">Valor Compra Uni</th>
                        <th style="padding:6px 8px; text-align:right;">Valor Venda Uni</th>
                        <th style="padding:6px 8px; text-align:right;">Valor Compra Total</th>
                        <th style="padding:6px 8px; text-align:right;">Valor Venda Total</th>
                        <th style="padding:6px 8px; text-align:right;">Lucro Uni</th>
                        <th style="padding:6px 8px; text-align:right;">Lucro Total</th>
                        <th style="padding:6px 8px; text-align:right;">Lucro %</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        let temPedidos = false;
        
        for (const pedidoKey in pedidosAgrupados) {
            const item = pedidosAgrupados[pedidoKey];
            if (item.quantidadeTotal === 0) continue;
            temPedidos = true;
            
            const valorCompraMedio = item.valorCompraTotal / item.quantidadeTotal;
            const valorCompraTotal = item.valorCompraTotal;
            const valorVendaTotal = item.valorVenda * item.quantidadeTotal;
            const lucroUni = item.valorVenda - valorCompraMedio;
            const lucroTotal = lucroUni * item.quantidadeTotal;
            const lucroPercentual = item.valorCompraTotal > 0 ? (lucroTotal / item.valorCompraTotal) * 100 : 0;
            
            html += `
                <tr>
                    <td style="padding:6px 8px;">${item.pedido}</td>
                    <td style="padding:6px 8px;">${item.data}</td>
                    <td style="padding:6px 8px; text-align:center;">${item.quantidadeTotal}</td>
                    <td style="padding:6px 8px; text-align:right;">${formatarMoedaBR(valorCompraMedio)}</td>
                    <td style="padding:6px 8px; text-align:right;">${formatarMoedaBR(item.valorVenda)}</td>
                    <td style="padding:6px 8px; text-align:right;">${formatarMoedaBR(valorCompraTotal)}</td>
                    <td style="padding:6px 8px; text-align:right;">${formatarMoedaBR(valorVendaTotal)}</td>
                    <td style="padding:6px 8px; text-align:right;">${formatarMoedaBR(lucroUni)}</td>
                    <td style="padding:6px 8px; text-align:right;">${formatarMoedaBR(lucroTotal)}</td>
                    <td style="padding:6px 8px; text-align:right;">${lucroPercentual.toFixed(1)}%</td>
                </tr>
            `;
        }
        
        html += `
                </tbody>
            </table>
        `;
        
        if (!temPedidos) {
            html = '<div style="text-align:center; padding:20px; color:#999;">Nenhum pedido encontrado para este produto no período selecionado.</div>';
        }
        
        container.innerHTML = html;
    }
}







// ===== FUNÇÃO PARA ORGANIZAR MAIOR DIFERENÇA =====
function organizarMaiorDiferenca(tipo) {
    const btnCompra = document.getElementById('btn-organizar-compra');
    const btnVenda = document.getElementById('btn-organizar-venda');
    const btnLucro = document.getElementById('btn-organizar-lucro');
    const btnLucroPerc = document.getElementById('btn-organizar-lucro-perc');
    
    if (btnCompra) btnCompra.classList.remove('active');
    if (btnVenda) btnVenda.classList.remove('active');
    if (btnLucro) btnLucro.classList.remove('active');
    if (btnLucroPerc) btnLucroPerc.classList.remove('active');
    
    if (tipo === 'compra') {
        if (btnCompra) btnCompra.classList.add('active');
        window.organizacaoAtualDiferenca = 'compra';
    } else if (tipo === 'venda') {
        if (btnVenda) btnVenda.classList.add('active');
        window.organizacaoAtualDiferenca = 'venda';
    } else if (tipo === 'lucro') {
        if (btnLucro) btnLucro.classList.add('active');
        window.organizacaoAtualDiferenca = 'lucro';
    } else {
        if (btnLucroPerc) btnLucroPerc.classList.add('active');
        window.organizacaoAtualDiferenca = 'percentual';
    }
    
    const produtos = calcularProdutosMaiorDiferenca(window.periodoAtualDiferenca || 'todo');
    const periodos = {
        'todo': 'Todo o período',
        'mes': 'Esse mês',
        '3meses': 'Últimos 3 meses',
        '5meses': 'Últimos 5 meses',
        '8meses': 'Últimos 8 meses',
        '12meses': 'Últimos 12 meses'
    };
    const titulo = `📊 Maior diferença de preço - ${periodos[window.periodoAtualDiferenca || 'todo']}`;
    renderizarMaiorDiferenca(produtos, titulo);
}

window.ordenacaoProdutosPorPedido = {
    coluna: null,
    ordem: 'asc' // 'asc' ou 'desc'
}
window.periodoAtualProdutosPorPedido = 'todo';



function ordenarProdutosPorPedido(coluna) {
   // Se for a mesma coluna, inverte a ordem
    if (window.ordenacaoProdutosPorPedido.coluna === coluna) {
        window.ordenacaoProdutosPorPedido.ordem = window.ordenacaoProdutosPorPedido.ordem === 'asc' ? 'desc' : 'asc';
    } else {
        window.ordenacaoProdutosPorPedido.coluna = coluna;
        window.ordenacaoProdutosPorPedido.ordem = 'asc';
    }
    
    // Aplicar a ordenação
    const ordem = window.ordenacaoProdutosPorPedido.ordem;
    const colunaIndex = {
        'pedido': 0,
        'data': 1,
        'produtosUnicos': 2,
        'quantidadeTotal': 3,
        'pontos': 4,
        'precoCompra': 5,
        'precoVenda': 6,
        'lucro': 7,
        'lucroPercentual': 8,
        'indisponiveis': 9
    };
    
    const idx = colunaIndex[coluna];
    if (idx === undefined) return;
    
    const tbody = document.getElementById('tableBody');
    if (!tbody) return;
    
    const rows = Array.from(tbody.querySelectorAll('tr.pedido-row'));
    if (rows.length === 0) return;
    
    // Pegar as linhas de detalhe associadas a cada pedido
    const rowsComDetalhes = rows.map(row => {
        const pedidoId = row.querySelector('td')?.textContent?.replace('▶', '')?.replace('▼', '')?.trim();
        const detalheRow = pedidoId ? document.getElementById(`detalhe-produtos-${pedidoId}`) : null;
        return { row, detalheRow, pedidoId };
    });
    
    // Ordenar as linhas
    rowsComDetalhes.sort((a, b) => {
        const cellsA = a.row.querySelectorAll('td');
        const cellsB = b.row.querySelectorAll('td');
        if (cellsA.length <= idx || cellsB.length <= idx) return 0;
        
        let valA = cellsA[idx].textContent.trim();
        let valB = cellsB[idx].textContent.trim();
        
        // Converter para número se for valor monetário ou número
        if (coluna === 'precoCompra' || coluna === 'precoVenda' || coluna === 'lucro' || coluna === 'lucroPercentual') {
            valA = parseFloat(valA.replace(/[R$\s.,]/g, '').replace(',', '.')) || 0;
            valB = parseFloat(valB.replace(/[R$\s.,]/g, '').replace(',', '.')) || 0;
        } else if (coluna === 'produtosUnicos' || coluna === 'quantidadeTotal' || coluna === 'pontos' || coluna === 'indisponiveis') {
            valA = parseInt(valA) || 0;
            valB = parseInt(valB) || 0;
        } else if (coluna === 'data') {
            const partesA = valA.split('/');
            const partesB = valB.split('/');
            if (partesA.length === 3 && partesB.length === 3) {
                valA = new Date(partesA[2], partesA[1] - 1, partesA[0]).getTime();
                valB = new Date(partesB[2], partesB[1] - 1, partesB[0]).getTime();
            }
        } else {
            valA = valA.toLowerCase();
            valB = valB.toLowerCase();
        }
        
        if (valA < valB) return ordem === 'asc' ? -1 : 1;
        if (valA > valB) return ordem === 'asc' ? 1 : -1;
        return 0;
    });
    
    // Reordenar no DOM - coloca a linha do pedido e seu detalhe juntos
    rowsComDetalhes.forEach(item => {
        tbody.appendChild(item.row);
        if (item.detalheRow) {
            tbody.appendChild(item.detalheRow);
        }
    });
    
    // Atualizar as setas no cabeçalho
    atualizarSetasCabecalho();
    
    console.log(`✅ Ordenado por ${coluna} (${ordem})`);
}







function atualizarSetasOrdenacao(colunaAtiva) {
    const headers = document.querySelectorAll('#dataTable thead th');
    const colunas = ['pedido', 'data', 'produtosUnicos', 'quantidadeTotal', 'pontos', 'precoCompra', 'precoVenda', 'lucro', 'lucroPercentual', 'indisponiveis'];
    
    headers.forEach((th, index) => {
        if (index >= colunas.length) return;
        const coluna = colunas[index];
        const textoOriginal = th.getAttribute('data-texto-original') || th.textContent.replace(/[▲▼]/g, '').trim();
        
        // Remover setas existentes
        th.textContent = textoOriginal;
        
        // Adicionar seta se for a coluna ativa
        if (coluna === colunaAtiva) {
            const ordem = window.ordenacaoProdutosPorPedido.ordem || 'asc';
            const seta = ordem === 'asc' ? ' ▲' : ' ▼';
            th.textContent += seta;
        }
        
        // Salvar texto original
        th.setAttribute('data-texto-original', textoOriginal);
    });
}








function atualizarSetasCabecalho() {
     const colunaAtiva = window.ordenacaoProdutosPorPedido?.coluna || null;
    const ordemAtiva = window.ordenacaoProdutosPorPedido?.ordem || 'asc';
    
    const headers = document.querySelectorAll('#tableWrapper thead th');
    headers.forEach(th => {
        const coluna = th.getAttribute('data-coluna');
        if (!coluna) return;
        
        // Pegar o texto original
        let textoOriginal = th.getAttribute('data-texto-original');
        if (!textoOriginal) {
            textoOriginal = th.textContent.replace(/[▲▼▾▴]/g, '').trim();
            th.setAttribute('data-texto-original', textoOriginal);
        }
        
        const isAtiva = coluna === colunaAtiva;
        
        // Remover tudo e reconstruir
        const seta = isAtiva ? (ordemAtiva === 'asc' ? '▲' : '▼') : '▾';
        
        // Texto principal + seta
        th.textContent = textoOriginal;
        
        // Adicionar a seta como span separado para controlar cor
        const setaSpan = document.createElement('span');
        setaSpan.textContent = ' ' + seta;
        setaSpan.style.marginLeft = '2px';
        
        if (isAtiva) {
            setaSpan.style.color = '#0b4f6c';
            setaSpan.style.fontWeight = 'bold';
            th.style.background = '#e3f2fd'; // Azul claro
            th.style.color = '#0b4f6c';
            th.style.fontWeight = 'bold';
        } else {
            setaSpan.style.color = 'rgba(255,255,255,0.6)';
            setaSpan.style.fontWeight = 'normal';
            th.style.background = '#1f5e7e'; // Azul escuro original
            th.style.color = '#ffffff';
            th.style.fontWeight = 'normal';
        }
        
        th.appendChild(setaSpan);
    });
}

function renderizarTabelaProdutosComFiltro(produtosFiltrados) {
    const container = document.getElementById('tableWrapper');
    
    if (!produtosFiltrados || produtosFiltrados.length === 0) {
        container.innerHTML = `
            <div style="text-align:center; padding:40px; color:#667;">
                📦 Nenhum dado de produto encontrado no período selecionado.
            </div>
        `;
        return;
    }
    
    // Ordenar por data (mais recente primeiro) - padrão
    const dadosParaRender = [...produtosFiltrados];
    dadosParaRender.sort((a, b) => {
        const dataA = new Date(a.data.split('/').reverse().join('/'));
        const dataB = new Date(b.data.split('/').reverse().join('/'));
        return dataB - dataA;
    });
    
    // ===== PEGAR A COLUNA E ORDEM ATUAL =====
    const colunaAtiva = window.ordenacaoProdutosPorPedido?.coluna || null;
    const ordemAtiva = window.ordenacaoProdutosPorPedido?.ordem || 'asc';
    
    // ===== LISTA DE COLUNAS =====
    const colunas = [
        { key: 'pedido', label: 'Pedido', align: 'left' },
        { key: 'data', label: 'Data', align: 'left' },
        { key: 'produtosUnicos', label: 'Produtos Únicos', align: 'center' },
        { key: 'quantidadeTotal', label: 'Quantidade Total', align: 'center' },
        { key: 'pontos', label: 'Pontos', align: 'center' },
        { key: 'precoCompra', label: 'Preço de Compra', align: 'right' },
        { key: 'precoVenda', label: 'Preço de Venda', align: 'right' },
        { key: 'lucro', label: 'Lucro (R$)', align: 'right' },
        { key: 'lucroPercentual', label: 'Lucro (%)', align: 'right' },
        { key: 'indisponiveis', label: 'Indisponíveis', align: 'center' }
    ];
    
    let html = `
        <div style="overflow-x:auto; padding:20px 0; position:relative;">
            <table style="width:100%; border-collapse:collapse; font-size:13px;">
                <thead>
                    <tr style="background:#1f5e7e; position:sticky; top:0; z-index:10;">
    `;
    
    // Gerar cabeçalho - SEM bordas
    for (const col of colunas) {
        const isAtiva = col.key === colunaAtiva;
        const bgColor = isAtiva ? 'background:#e3f2fd;' : 'background:#1f5e7e;';
        const textColor = isAtiva ? 'color:#0b4f6c;' : 'color:#ffffff;';
        const seta = isAtiva ? (ordemAtiva === 'asc' ? ' ▲' : ' ▼') : ' ▾';
        const setaColor = isAtiva ? 'color:#0b4f6c;' : 'color:rgba(255,255,255,0.6);';
        
        html += `
            <th style="padding:12px 10px; text-align:${col.align}; white-space:nowrap; cursor:pointer; user-select:none; ${bgColor} ${textColor}; border:none;" 
                onclick="ordenarProdutosPorPedido('${col.key}')" 
                data-coluna="${col.key}"
                data-texto-original="${col.label}">
                ${col.label}<span style="${setaColor}">${seta}</span>
            </th>
        `;
    }
    
    html += `
                    </tr>
                </thead>
                <tbody id="tableBody">
    `;
    
    for (const p of dadosParaRender) {
        const precoCompra = p.precoCompra || 0;
        
        let precoVenda = 0;
        if (p.linhas) {
            for (const item of p.linhas) {
                if (item.isIndisponivel) continue;
                if (item.vendaTotal === 0) continue;
                const qtd = parseInt(item.quantidade) || 0;
                precoVenda += (item.vendaUnit || 0) * qtd;
            }
        }
        
        const lucroTotal = precoVenda - precoCompra;
        const lucroPercentual = precoCompra > 0 ? (lucroTotal / precoCompra) * 100 : 0;
        
        const pedidoId = p.pedido;
        
        html += `
            <tr class="pedido-row" onclick="toggleDetalhesProdutos('${pedidoId}')" style="cursor:pointer; transition:background 0.2s;">
                <td style="padding:10px; border-bottom:1px solid #e9ecef; vertical-align:middle;">
                    <span class="expand-icon" id="icon-${pedidoId}">▶</span> ${pedidoId}
                </td>
                <td style="padding:10px; border-bottom:1px solid #e9ecef; vertical-align:middle;">${p.data}</td>
                <td style="padding:10px; border-bottom:1px solid #e9ecef; vertical-align:middle; text-align:center;">${p.produtosUnicos}</td>
                <td style="padding:10px; border-bottom:1px solid #e9ecef; vertical-align:middle; text-align:center;">${p.totalProdutos}</td>
                <td style="padding:10px; border-bottom:1px solid #e9ecef; vertical-align:middle; text-align:center;">${p.totalPontos}</td>
                <td style="padding:10px; border-bottom:1px solid #e9ecef; vertical-align:middle; text-align:right;">${formatarMoedaBR(precoCompra)}</td>
                <td style="padding:10px; border-bottom:1px solid #e9ecef; vertical-align:middle; text-align:right;">${formatarMoedaBR(precoVenda)}</td>
                <td style="padding:10px; border-bottom:1px solid #e9ecef; vertical-align:middle; text-align:right;">${formatarMoedaBR(lucroTotal)}</td>
                <td style="padding:10px; border-bottom:1px solid #e9ecef; vertical-align:middle; text-align:right;">${lucroPercentual.toFixed(1)}%</td>
                <td style="padding:10px; border-bottom:1px solid #e9ecef; vertical-align:middle; text-align:center;">${p.produtosIndisponiveis}</td>
            </tr>
            <tr id="detalhe-produtos-${pedidoId}" class="parcelas-detail">
                <td colspan="10">
                    <div class="detail-card">
                        <strong>📋 Produtos do Pedido ${pedidoId}</strong>
                        <div style="margin-top:10px; overflow-x:auto;">
                            <table style="width:100%; border-collapse:collapse; font-size:12px;">
                                <tbody id="produtos-detalhe-${pedidoId}">
                                    <tr><td colspan="13" style="text-align:center; padding:20px; color:#999;">Carregando produtos...</td></tr>
                                </tbody>
                            </table>
                        </div>
                        <small>Dados da aba Produtos | ${new Date().toLocaleString('pt-BR')}</small>
                    </div>
                </td>
            </tr>
        `;
    }
    
    html += `
                </tbody>
            </table>
        </div>
    `;
    
    container.innerHTML = html;
    
    // ===== REMOVER TODAS AS BORDAS =====
    const thead = container.querySelector('thead');
    if (thead) {
        thead.style.borderBottom = 'none';
        thead.style.border = 'none';
    }
    
    const tr = container.querySelector('thead tr');
    if (tr) {
        tr.style.borderBottom = 'none';
        tr.style.border = 'none';
    }
    
    const headers = container.querySelectorAll('thead th');
    headers.forEach(th => {
        th.style.borderBottom = 'none';
        th.style.border = 'none';
    });
    
    // ===== ATUALIZAR AS SETAS =====
    atualizarSetasCabecalho();
}





function filtrarProdutosPorPedido(periodo) {
    const botoes = document.querySelectorAll('#semanaInfo .btn-submenu');
    botoes.forEach(b => b.classList.remove('active'));
    
    const periodos = {
        'todo': 'Todo o período',
        'mes': 'Esse mês',
        '3meses': 'Últimos 3 meses',
        '5meses': 'Últimos 5 meses',
        '8meses': 'Últimos 8 meses',
        '12meses': 'Últimos 12 meses'
    };
    
    botoes.forEach(b => {
        if (b.textContent.trim() === periodos[periodo]) {
            b.classList.add('active');
        }
    });
    
    window.periodoAtualProdutosPorPedido = periodo;
    
    // Recarregar a tabela com o filtro
    mostrarProdutosPorPedido();
}




function removerBordaThead() {
    const thead = document.querySelector('#tableWrapper thead');
    if (thead) {
        thead.style.borderBottom = 'none';
        thead.style.border = 'none';
        console.log('✅ Borda do THEAD removida!');
    }
}
