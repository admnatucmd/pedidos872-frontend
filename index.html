let produtosData = [];
let produtosPorPedido = {};

async function carregarProdutos() {
    try {
        // ===== USA A ROTA /api/sheet-data COM PARÂMETRO sheet=Produtos =====
        const response = await fetch(`${API_BASE_URL}/api/sheet-data?sheet=Produtos`, {
            method: 'GET',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            }
        });
        
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errorText}`);
        }
        
        const result = await response.json();
        
        if (!result.success) {
            throw new Error(result.error || 'Erro ao buscar produtos');
        }
        
        // ===== PROCESSAR DADOS =====
        processarDadosProdutos(result.data);
        
        return true;
    } catch (error) {
        console.error('❌ Erro ao carregar produtos:', error);
        showNotification('❌ Erro ao carregar produtos: ' + error.message, 'error');
        return false;
    }
}

function processarDadosProdutos(data) {
    if (!data || data.length < 2) {
        produtosData = [];
        produtosPorPedido = {};
        window.produtosData = [];
        return;
    }
    
    const idxPedido = 0;
    const idxData = 1;
    const idxNotaFiscal = 2;
    const idxPrecoCompra = 3;
    const idxValorVendaTotal = 17;
    const idxLucro = 18;
    const idxReferencia = 22; // ← COLUNA W (REFERÊNCIA)
    
    let pedidoAtual = null;
    produtosPorPedido = {};
    
    for (let i = 1; i < data.length; i++) {
        const row = data[i];
        if (row.length < 10) continue;
        
        let pedido = String(row[idxPedido] || '').trim();
        if (pedido === '' || pedido === 'Pedido') {
            pedido = pedidoAtual;
        } else {
            pedidoAtual = pedido;
        }
        
        if (!pedido || pedido === 'Pedido') continue;
        
        if (!produtosPorPedido[pedido]) {
            produtosPorPedido[pedido] = {
                pedido: pedido,
                data: String(row[idxData] || '').trim(),
                notaFiscal: String(row[idxNotaFiscal] || '').trim(),
                precoCompra: limparValorProduto(String(row[idxPrecoCompra] || '0')),
                valorVendaTotal: 0,
                lucroTotal: 0,
                produtosIndisponiveis: 0, // ← NOVO
                linhas: []
            };
        }
        
        const valorVenda = limparValorProduto(String(row[idxValorVendaTotal] || '0'));
        const lucro = limparValorProduto(String(row[idxLucro] || '0'));
        const referencia = row.length > idxReferencia ? String(row[idxReferencia] || '').trim() : '';
        const quantidade = row.length > 12 ? String(row[12] || '0').trim() : '0';
        const codigo = row.length > 10 ? String(row[10] || '').trim() : '';
        const produto = row.length > 11 ? String(row[11] || '').trim() : '';
        
        // ===== VERIFICA SE É INDISPONÍVEL =====
        const isIndisponivel = referencia.includes('Produtos indisponível na realização do pedido');
        
        produtosPorPedido[pedido].linhas.push({
            linha: i,
            codigo: codigo,
            produto: produto,
            quantidade: quantidade,
            valorVenda: valorVenda,
            lucro: lucro,
            referencia: referencia,
            isIndisponivel: isIndisponivel // ← NOVO
        });
    }
    
    produtosData = Object.values(produtosPorPedido).map(p => {
        let valorVendaTotal = 0;
        let lucroTotal = 0;
        let produtosUnicos = 0;
        let totalProdutos = 0;
        let produtosIndisponiveis = 0;
        
        console.log(`📊 Pedido ${p.pedido} - ${p.linhas.length} linhas`);
        
        for (const item of p.linhas) {
            // ===== CONTA PRODUTOS INDISPONÍVEIS =====
            if (item.isIndisponivel) {
                produtosIndisponiveis++;
                console.log(`   ⛔ Indisponível: ${item.produto} - ${item.referencia}`);
                continue; // Pula para o próximo item
            }
            
            // ===== SE VALOR DE VENDA É 0, PARA DE SOMAR E CONTAR =====
            if (item.valorVenda === 0) {
                console.log(`   ⛔ PAROU! Valor 0 encontrado - ignorando produtos indisponíveis`);
                break;
            }
            
            const qtd = parseInt(item.quantidade) || 0;
            
            if (qtd > 0) {
                produtosUnicos++;
                totalProdutos += qtd;
                valorVendaTotal += item.valorVenda;
                lucroTotal += item.lucro;
            }
        }
        
        console.log(`   ✅ Produtos únicos: ${produtosUnicos}`);
        console.log(`   ✅ Total de produtos: ${totalProdutos}`);
        console.log(`   ✅ Produtos indisponíveis: ${produtosIndisponiveis}`);
        console.log(`   ✅ Soma da coluna R: ${valorVendaTotal}`);
        
        const precoVenda = valorVendaTotal;
        const lucroFinal = precoVenda - p.precoCompra;
        const lucroPercentual = p.precoCompra > 0 ? (lucroFinal / p.precoCompra) * 100 : 0;
        
        return {
            ...p,
            produtosUnicos: produtosUnicos,
            totalProdutos: totalProdutos,
            produtosIndisponiveis: produtosIndisponiveis, // ← NOVO
            precoVenda: precoVenda,
            lucroTotal: lucroFinal,
            lucroPercentual: lucroPercentual
        };
    });
    
    window.produtosData = produtosData;
    window.produtosPorPedido = produtosPorPedido;
    
    console.log(`📊 ${produtosData.length} pedidos carregados da aba Produtos`);
}

function toggleDetalhesProdutos(pedidoId) {
    const row = document.getElementById(`detalhe-produtos-${pedidoId}`);
    if (!row) return;
    
    row.classList.toggle('show');
    const icon = row.previousElementSibling.querySelector('.expand-icon');
    if (icon) icon.innerHTML = row.classList.contains('show') ? '▼' : '▶';
    
    // Se abriu, carregar os produtos detalhados
    if (row.classList.contains('show')) {
        carregarProdutosDetalhados(pedidoId);
    }
}

async function carregarProdutosDetalhados(pedidoId) {
    const tbody = document.getElementById(`produtos-detalhe-${pedidoId}`);
    if (!tbody) return;
    
    // Verifica se já tem dados
    if (tbody.querySelector('tr')?.textContent !== 'Carregando produtos...') {
        return;
    }
    
    try {
        // Buscar os produtos específicos do pedido
        const response = await fetch(`${API_BASE_URL}/api/produtos/pedido/${pedidoId}`, {
            method: 'GET',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            }
        });
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        
        if (!data.success || !data.data || data.data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; padding:20px; color:#999;">Nenhum produto encontrado para este pedido.</td></tr>`;
            return;
        }
        
        let html = '';
        // Pular cabeçalho (linha 1) e processar produtos
        for (let i = 1; i < data.data.length; i++) {
            const row = data.data[i];
            if (row.length < 10) continue;
            
            const codigo = row[10] || '';
            const produto = row[11] || '';
            const qtd = row[12] || '0';
            const valorUnit = limparValorProduto(row[14] || '0');
            const valorTotal = limparValorProduto(row[15] || '0');
            const vendaUnit = limparValorProduto(row[16] || '0');
            const vendaTotal = limparValorProduto(row[17] || '0');
            const lucro = limparValorProduto(row[18] || '0');
            const lucroPercentual = valorUnit > 0 ? (lucro / valorUnit) * 100 : 0;
            
            html += `
                <tr>
                    <td style="padding:6px 8px;">${codigo}</td>
                    <td style="padding:6px 8px;">${produto}</td>
                    <td style="padding:6px 8px; text-align:center;">${qtd}</td>
                    <td style="padding:6px 8px; text-align:right;">${formatarMoedaBR(valorUnit)}</td>
                    <td style="padding:6px 8px; text-align:right;">${formatarMoedaBR(valorTotal)}</td>
                    <td style="padding:6px 8px; text-align:right;">${formatarMoedaBR(vendaUnit)}</td>
                    <td style="padding:6px 8px; text-align:right;">${formatarMoedaBR(vendaTotal)}</td>
                    <td style="padding:6px 8px; text-align:right;">${formatarMoedaBR(lucro)}</td>
                    <td style="padding:6px 8px; text-align:right;">${lucroPercentual.toFixed(1)}%</td>
                </tr>
            `;
        }
        
        tbody.innerHTML = html || `<tr><td colspan="9" style="text-align:center; padding:20px; color:#999;">Nenhum produto encontrado.</td></tr>`;
        
    } catch (error) {
        console.error('❌ Erro ao carregar produtos detalhados:', error);
        tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; padding:20px; color:red;">❌ Erro ao carregar produtos: ${error.message}</td></tr>`;
    }
}


function limparValorProduto(valor) {
    if (!valor || valor === '') return 0;
    const str = String(valor).replace('R$', '').replace(/\./g, '').replace(',', '.').trim();
    return parseFloat(str) || 0;
}
